appId: com.oh-my-pomodoro.app
productName: Oh-My-Pomodoro
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*
  - "!**/*.md"
  - "!**/CLAUDE.md"
  - "!**/TEAM_LEAD.md"
  - "!**/PLANNER.md"
  - "!**/LICENSE"
  - "!**/.gitkeep"
extraResources:
  - from: resources/sounds
    to: sounds
    filter:
      - "**/*"
      - "!.gitkeep"
win:
  target:
    - zip
forceCodeSigning: false
